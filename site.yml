---
- hosts: cluster
  gather_facts: true
  any_errors_fatal: true
  tasks:
    - name: Setup incus server(s)
      ansible.builtin.import_role:
        name: incus
      tags: cluster

- name: Deploying Colosseum
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Deploy Colosseum Infrastracture
      ansible.builtin.import_role:
        name: terraform
      tags: infrastructure
      vars:
        cluster_address: "{{ hostvars[groups['cluster'][0]]['ansible_host']}}"
        nodes: "{{ groups['cluster'] }}"
        instances_type: "container"
        project_name: "ColosseumCTF"

    - name: Configure vulnbox hosts group
      ansible.builtin.add_host:
        host: "{{item}}-vulnbox"
        group: "vulnbox"
      loop: "{{ teams }}"

- name: Configure vulnboxes
  hosts: vulnbox
  gather_facts: true
  roles:
    - vulnbox

