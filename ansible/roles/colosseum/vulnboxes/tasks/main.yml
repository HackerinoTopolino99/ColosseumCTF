---
- name: Generate ssh key for admins
  openssh_keypair:
    path: "out/colosseum_id_ed25519"
    type: ed25519
    force: true
  run_once: true
  delegate_to: localhost
  connection: local

- name: Copy host ssh key on the vulnbox
  authorized_key:
    user: root
    key: "{{ lookup('file', 'out/colosseum_id_ed25519.pub') }}"

- name: Create random password
  set_fact:
    root_password: >
      "{{ lookup('ansible.builtin.password',
      '/dev/null',
      seed=inventory_hostname) }}"

- name: Set the generated password as root password
  user:
    name: root
    password: "{{ root_password | password_hash('sha512') }}"

- name: Create Output Direcotry
  file:
    path: "out/vm_passwords"
    state: directory
    mode: "0755"
  delegate_to: localhost
  connection: local

- name: Save the password to a local file
  copy:
    content: "{{ root_password }}\n"
    dest: "out/vm_passwords/{{ inventory_hostname }}.txt"
    mode: "0644"
  delegate_to: localhost
  connection: local
