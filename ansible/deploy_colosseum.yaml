---
- name: "Deploying Colosseum"
- hosts: localhost
  gather_facts: false
  connection: local
  roles:
    - "{ role: colosseum/terraform }"

- name: "Configuring router of the game network"
- hosts: router
  gather_facts: false
  roles:
    - "{ role: colosseum/router }"

- name: "Configuring Vulnboxes"
- hosts: vulnboxes
  gather_facts: false
  roles:
    - "{ role: colosseum/vulnboxes }"
  tasks:
    - name: "Get address from router"
      systemd_service:
        name: systemd-networkd
        state: restarted
