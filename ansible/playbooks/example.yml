- hosts: cluster_nodes
  any_errors_fatal: true
  roles:
    - ovn
    - incus

- hosts: localhost
  connection: local
  tasks:
    - name: Init packer project
      shell: packer init ../packer/templates

    - name: Deploy packer
      shell: packer build ../packer/templates

- hosts: cluster_nodes
  roles:
    - terraform

- hosts: vulnboxes
  remote_user: "root"
  roles:
    - vulnbox

- hosts: vpns
  roles:
    - vpn

- hosts: faustgameserver
  roles:
    - gameserver
