---
- name: Check ansible distribution
  ansible.builtin.meta: end_play
  when: 'ansible_distribution not in ("Debian")'

- name: Check hosts numbers
  ansible.builtin.meta: end_play
  when: groups['cluster'] | length == 2

- name: Install necessary packages
  tags: apt
  become: true
  block:
    - name: Update all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: true

    - name: Remove packages no longer needed
      ansible.builtin.apt:
        autoremove: true
        clean: true
        autoclean: true

    - name: Install Incus
      ansible.builtin.apt:
        name:
          - incus
        state: present
        update_cache: true

    - name: Install rsync for clustering
      ansible.builtin.apt:
        name: rsync
        state: present
      when: groups['cluster'] | length > 2

    - name: Install virtual machine requirements
      ansible.builtin.apt:
        name:
          - qemu-system
          - qemu-utils
        state: present
        # Add condition

    - name: Enable Incus service unit
      ansible.builtin.systemd_service:
        name: incus.service
        state: restarted
        enabled: true

    - name: Enable Incus socket unit
      ansible.builtin.systemd_service:
        name: incus.socket
        state: restarted
        enabled: true

    - name: Enable Incus-startup service unit
      ansible.builtin.systemd_service:
        name: incus-startup.service
        state: restarted
        enabled: true

- name: Configure subuid for root
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^root:"
    line: "root:1000000:1000000000"
    state: present
    create: true
    mode: "0644"
  become: true

- name: Configure subgid for root
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^root:"
    line: "root:1000000:1000000000"
    state: present
    create: true
    mode: "0644"
  become: true

- name: Set client listen address
  ansible.builtin.command:
    argv:
      - incus
      - --force-local
      - config
      - set
      - core.https_address
      - "{{ incus_cluster_address }}"
  when: >
    groups['cluster'] | length == 1 or inventory_hostname == incus_bootstrap_server
  changed_when: true
  become: true

- name: Configure Incus cluster
  when: groups['cluster'] | length > 2
  block:
    - name: Bootstrap cluster
      ansible.builtin.command:
        cmd: "incus --force-local cluster enable {{ inventory_hostname }}"
      when: inventory_hostname == incus_bootstrap_server
      changed_when: true
      register: ret
      failed_when:
        - ret.rc != 0
        - "'Error: This server is already clustered' not in ret.stderr"
      become: true

    - name: Generate node incus_token
      ansible.builtin.command:
        cmd: "incus cluster --force-local --quiet add {{ inventory_hostname }}"
      register: incus_token
      delegate_to: "{{ incus_bootstrap_server }}"
      when: inventory_hostname != incus_bootstrap_server
      changed_when: true
      failed_when:
        - incus_token.rc != 0
        - "'Error: The cluster already has a member with name' not in incus_token.stderr"
      become: true
      notify:
        - Wait 5s to avoid token use before valid
        - Copy init file on other nodes
        - Join cluster

- name: Trust client
  when: inventory_hostname == incus_bootstrap_server
  block:
    - name: Upload client certificate
      ansible.builtin.copy:
        src: ~/.config/incus/client.crt
        dest: /tmp/client.crt
        mode: "0644"

    - name: Add client certificate
      ansible.builtin.command:
        cmd: "incus config trust add-certificate /tmp/client.crt"
      register: incus_ret
      failed_when:
        - ret.rc != 0
        - "'Error: Certificate already in trust store' not in ret.stderr"
      changed_when: true
      become: true

- name: Add remote
  ansible.builtin.command:
    cmd: "incus remote add {{ remote }} {{ incus_cluster_address }} --accept-certificate"
  register: incus_ret
  failed_when:
    - incus_ret.rc != 0
    - remote not in incus_ret.stderr
  changed_when: true
  run_once: true
  connection: local
  delegate_to: localhost
