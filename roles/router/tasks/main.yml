---
- name: Debug
  ansible.builtin.debug:
    var: router_vpn_endpoint_address

- name: Generate server private key
  ansible.builtin.command:
    cmd: wg genkey
  register: router_server_private_key
  changed_when: true

- name: Generate server public key
  ansible.builtin.shell:
    cmd: |
      set -o pipefail #
      echo -n "{{ router_server_private_key.stdout }}" | wg pubkey
  register: server_public_key
  changed_when: true

- name: Generate server configuration
  ansible.builtin.template:
    src: wg0_server.conf.j2
    mode: "0600"
    dest: /etc/wireguard/wg0.conf

- name: Set router_endpoint
  ansible.builtin.set_fact:
    router_endpoint: "{{ router_vpn_endpoint_address }}:51820"

- name: Delete existing output folder
  ansible.builtin.file:
    path: "out/vpns/{{ item }}"
    state: absent
  loop: "{{ teams }}"
  delegate_to: localhost
  connection: local

- name: Create output folder
  ansible.builtin.file:
    path: "out/vpns/{{ item }}"
    state: directory
    recurse: true
  loop: "{{ teams }}"
  delegate_to: localhost
  connection: local

- name: Clients configuration
  ansible.builtin.include_tasks: wireguard-client-tasks.yml
  loop: "{{ teams | product(range(1, players_number + 1)) | list }}"
  loop_control:
    loop_var: player

- name: Add server configuration to network
  ansible.builtin.blockinfile:
    path: /etc/network/interfaces
    append_newline: true
    block: |
      auto wg0
      iface wg0 inet static
      pre-up wg-quick up /etc/wireguard/wg0.conf
      post-down wg-quick down /etc/wireguard/wg0.conf
  notify: Restart networking service

- name: Render vulnboxes static leases
  ansible.builtin.template:
    src: hosts.conf.j2
    dest: /etc/dnsmasq.d/hosts.conf
    mode: "0644"

- name: Restart dnsmasq
  ansible.builtin.sysvinit:
    name: dnsmasq
    state: restarted
