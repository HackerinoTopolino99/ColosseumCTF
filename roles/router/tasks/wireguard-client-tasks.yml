---
- name: Generate client private key
  ansible.builtin.command:
    cmd: wg genkey
  register: client_private_key
  changed_when: true

- name: Generate client public key
  ansible.builtin.shell:
    cmd: |
      set -o pipefail #
      echo -n "{{ client_private_key.stdout }}" | wg pubkey
  register: client_public_key
  changed_when: true

- name: Set client Address
  ansible.builtin.set_fact:
    client_address: "10.80.{{ teams.index(player.0) + 1 }}.{{ player.1 }}"

- name: Generate client configuration
  ansible.builtin.template:
    src: wg0_client.conf.j2
    mode: "0600"
    dest: "out/vpns/{{ player.0 }}/player{{ player.1 }}.conf"
    force: true
  delegate_to: localhost
  connection: local

- name: Adding Peer to the wireguard server
  ansible.builtin.blockinfile:
    path: /etc/wireguard/wg0.conf
    marker: "# {mark} {{ player.0 }} player {{ player.1 }}"
    prepend_newline: true
    block: |
      [Peer]
      PublicKey = {{ client_public_key.stdout }}
      AllowedIPs = {{ client_address }}/32
    insertafter: EOF
