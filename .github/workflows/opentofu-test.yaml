name: OpenTofu Tests

on:
  push:
    paths:
      - '**.tf'
      - '.github/workflows/opentofu-test.yml'
  pull_request:
    paths:
      - '**.tf'
jobs:
  opentofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible/roles/colosseum/terraform/files/colosseum-infrastructure/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Check formatting
        run: tofu fmt -check -recursive

      - name: Run tfsec (security checks)
        uses: aquasecurity/tfsec-action@v1.0.3

      - name: Initialize OpenTofu
        run: tofu init

      - name: Validate OpenTofu configuration
        run: tofu validate

      - name: Generate OpenTofu plan
        run: |
          tofu plan \
            -var="cluster_address=1.2.3.4" \
            -var="instances_type=container" \
            -var="remote=git@github.com:example/repo.git" \
            -var='teams=["team1","team2"]' \
            -var='nodes=["node1","node2"]'
